<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spentree - Levels</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@300;400;600;700;800&family=Press+Start+2P&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header style="text-align:center; padding:20px;">
  <img src="/images/logo.jpeg" alt="Spentree Logo" style="height:80px;">
</header>
    <div class="ambient-glow glow-1"></div>
    <div class="ambient-glow glow-2"></div>
    <div class="ambient-glow glow-3"></div>

    <nav class="glass-nav">
        <div class="logo">Spentree🌿</div>
        <div class="rank-badge" id="userRank">
            <span class="rank-title">Novice Sprout</span>
            <div class="xp-bar-container">
                <div class="xp-bar" id="xpBar" style="width: 0%"></div>
            </div>
        </div>
        <button id="logoutBtn" class="btn secondary-btn" type="button">Logout</button>
        <div class="nav-links" id="navLinks">
            <a href="index.html#hero">Philosophy</a>
            <a href="index.html#app">Daily Tree</a>
            <a href="index.html#forest">The Forest</a>
            <a href="index.html#levels">Levels</a>
            <a href="index.html#leaderboard">Leaderboard</a>
            <a href="profile.html" class="profile-link" title="Profile">👤</a>
        </div>
    </nav>

    <section id="levels" class="levels-section page-section active">
        <div class="container text-center">
            <h2 class="mb-3">Growth Stages</h2>
            <p class="subtitle mb-5">
                Earn <strong>1 XP</strong> by completing a daily budget without overspending.
            </p>
            <div class="leaderboard-card glass-card" style="max-width: 800px; margin: 0 auto;">
                <ul id="levelsGrid" class="leaderboard-list"></ul>
            </div>
        </div>
    </section>

    <script src="app.js"></script>
</body>
</html>
